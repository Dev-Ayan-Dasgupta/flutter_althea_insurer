name: flutter_althea_insurer
description: "AltheaCare Insurer Partner Intelligence Platform"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  connectivity_plus: ^6.1.5
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.1
  encrypt: ^5.0.3
  equatable: ^2.0.8
  fhir: ^0.12.1
  fhir_r4: ^0.4.4
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_polyline_points: ^3.1.0
  flutter_riverpod: ^3.0.3
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.1.0
  google_fonts: ^8.0.1
  google_maps_flutter: ^2.14.2
  graphql_flutter: ^5.2.1
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.6.2
  package_info_plus: ^9.0.0
  qr_flutter: ^4.1.0
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  signature: ^6.3.0
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  vector_math: ^2.2.0

dev_dependencies:
  build_runner: ^2.11.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

  fonts:
    - family: BalooBhaijaan2
      fonts:
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 800
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
